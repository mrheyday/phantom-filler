[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 10000
evm_version = "cancun"
via_ir = false
ffi = false
gas_reports = ["PhantomFiller", "PhantomSettlement"]

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "params_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"

[profile.ci]
fuzz = {runs = 1000}
invariant = {runs = 256}
